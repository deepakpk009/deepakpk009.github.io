<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../images/support.png">
    <link rel="apple-touch-icon" href="../images/support.png">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="3eb85710-2b57-4c5b-a822-ddf9990351ee"></script>
    <title>Support Page</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 24px;
            padding: 24px;
            box-sizing: border-box;
            min-height: 100vh;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
        }
        .container {
            width: 320px;
            min-height: 360px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            background: #fff;
            padding: 20px;
            margin: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            box-sizing: border-box;
        }
        .qr-code {
            margin-top: 20px;
        }
        .qr-code img {
            width: 150px;
            height: 150px;
        }
        .action-button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            border-radius: 999px;
            background-color: #2563eb;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }
        .action-button:hover,
        .action-button:focus {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Support Page</h1>
        <p>Scan the QR code below to get support:</p>
        <div class="qr-code">
            <img id="supportQR" src="" alt="QR Code">
        </div>
        <a id="supportButton" class="action-button" href="#" target="_blank" rel="noopener noreferrer">
            Open Support Page
        </a>
    </div>
    <div class="container">
        <h1>Feedback Form</h1>
        <p>Scan the QR code below to send feedback:</p>
        <div class="qr-code">
            <img id="feedbackQR" src="" alt="QR Code">
        </div>
        <a id="feedbackButton" class="action-button" href="#" target="_blank" rel="noopener noreferrer">
            Open Feedback Form
        </a>
    </div>
    <script>
        function generateQRCode(view, url) {
            const qrCode = document.getElementById(view);
            qrCode.src = `https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(url)}&size=150x150`;
        }

        // URL for support
        const supportURL = 'https://www.facebook.com/browsepad/';
        generateQRCode("supportQR", supportURL);
        document.getElementById("supportButton").href = supportURL;
        // URL for feedback form
        const feedbackURL = 'https://forms.gle/WqKesbqi3sLVpwhM9';
        generateQRCode("feedbackQR", feedbackURL);
        document.getElementById("feedbackButton").href = feedbackURL;
    </script>
</body>
</html>
